# Model configuration (Default: ViT-B/32)

defaults:
  - /head@head: default  # Default to bimodal head

# CLIP backbone model
clip_model: "ViT-B/32"   # CLIP backbone model (default to smaller, faster model)

# Basic model architecture  
embedding_dim: 512       # Output embedding dimension for alignment layers (512 for ViT-B/32)
mlp_layers: 1           # Number of MLP layers in alignment

# Multi-layer alignment configuration
alphas: []              # Fixed alpha weights for multi-layer alignment
init_alpha: 0.00        # Initial value for learnable alphas (if enabled)
learnable_alphas: false # Use learnable alpha weights for multi-layer aggregation

# Layer selection for alignment (empty means only 'final' layer)
text_layer_names: []    # Names of text layers to align (in addition to 'final')
image_layer_names: []   # Names of image layers to align (in addition to 'final')
