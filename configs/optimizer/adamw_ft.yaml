type: "adamw"
learning_rate: 5e-6
lr_scaling: "none"

optimizer_kwargs:
  weight_decay: 0.01
  betas: [0.9, 0.98]
  eps: 1e-6
  amsgrad: false

layerwise:
  enabled: false
  freeze_patterns: []

scheduler: "cosine"
scheduler_kwargs:
  warmup_epochs: 3
  warmup_start_lr_ratio: 0.1
  min_lr_ratio: 0.01
  step_based: true

ft_start_epoch: 0
