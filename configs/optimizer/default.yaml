# Default optimizer configuration (Adam)
type: "adam"
learning_rate: 0.01
lr_scaling: "none"       # LR scaling: "linear", "sqrt", "none" for multi-GPU
scheduler: "none"        # LR scheduler: "none", "linear", "cosine", "step"

# Optimizer-specific parameters (will be passed to optimizer constructor)
optimizer_kwargs:
  betas: [0.9, 0.999]
  eps: 1e-8
  weight_decay: 0.0

# Scheduler-specific settings (used when scheduler != "none")
scheduler_kwargs:
  # For step scheduler
  step_size: 10
  gamma: 0.1
  
  # For cosine scheduler
  cosine_t_max: null      # Maximum number of iterations (defaults to total epochs)
  cosine_eta_min: 0       # Minimum learning rate
  
  # For linear scheduler
  warmup_ratio: 0.05      # Fraction of training for warmup

# Fine-tuning specific settings
ft_start_epoch: 0       # Epoch to start fine-tuning (only used with FT alignment)
