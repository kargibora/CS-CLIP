# AdamW optimizer configuration for CLIP fine-tuning
type: "adamw"
learning_rate: 5e-7  # Much lower for fine-tuning (typical range: 1e-6 to 1e-5)
lr_scaling: "linear"  # Scale with batch size if using multi-GPU

# AdamW-specific parameters (CLIP standard)
optimizer_kwargs:
  weight_decay: 0.01  # Lower weight decay for fine-tuning (0.01-0.05)
  betas: [0.9, 0.98]  # CLIP standard beta2=0.98
  eps: 1e-6  # CLIP uses 1e-6 typically
  amsgrad: false

# Layer-wise learning rate decay (important for fine-tuning)
layerwise:
  enabled: true
  decay_rate: 0.9  # Each earlier layer gets 0.9x the LR of the next
  decay_type: "exponential"
  
  # Component-specific multipliers
  component_lrs:
    visual: 1.0      # Visual encoder baseline
    text: 0.5        # Text encoder often needs lower LR (more prone to overfitting)
    alignment: 2.0   # Alignment head can use higher LR (logit_scale, projections)
  
  # Don't apply weight decay to these
  no_decay_patterns: 
    - "bias"
    - "LayerNorm"
    - "layer_norm"
    - "ln_"
  
  # Optional: freeze early layers to prevent catastrophic forgetting
  freeze_patterns: []  # e.g., ["resblocks.0", "resblocks.1"] to freeze first 2 layers

# Cosine scheduler with warmup
scheduler: "cosine"
scheduler_kwargs:
  # Warmup is crucial for stability
  warmup_epochs: 1  # Or use warmup_ratio: 0.01 for 1% of training
  warmup_start_lr_ratio: 0.1  # Start at 10% of target LR
  
  # Cosine annealing
  min_lr_ratio: 0.01  # End at 1% of peak LR
  
  # Set true if you want per-step scheduling instead of per-epoch
  step_based: false  # Use true for very large datasets

# Training parameters (adjust based on your setup)
ft_start_epoch: 0  # Start fine-tuning from epoch 0