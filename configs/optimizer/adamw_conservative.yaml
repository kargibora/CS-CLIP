# Conservative layer-wise fine-tuning config for large models
optimizer_type: "AdamW"
learning_rate: 5e-6
lr_scaling: "none"
scheduler: "cosine"

optimizer_kwargs:
  betas: [0.9, 0.98]      # More stable beta2 for fine-tuning
  eps: 1e-6
  weight_decay: 0.05      # Higher weight decay for regularization
  amsgrad: false

layerwise:
  enabled: true
  decay_rate: 0.65        # More aggressive decay (deeper layers much slower)
  decay_type: "exponential"
  
  component_lrs:
    visual: 0.3           # Very conservative visual encoder LR
    text: 0.3             # Very conservative text encoder LR
    alignment: 5.0        # Alignment head learns much faster
  
  no_decay_patterns:
    - "bias"
    - "LayerNorm"
    - "layer_norm"
    - "ln_"
    - "norm"
    - "logit_scale"       # Don't decay temperature parameter
  
  freeze_patterns:
    - "positional_embedding"  # Freeze positional embeddings
    # - "token_embedding"     # Optionally freeze token embeddings

scheduler_kwargs:
  warmup_epochs: 2           # Longer warmup for stability
  warmup_start_lr_ratio: 0.01
  min_lr_ratio: 0.001        # Very low final LR
  step_based: false

ft_start_epoch: 0
