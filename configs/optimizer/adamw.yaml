# AdamW optimizer configuration  
type: "adamw"
learning_rate: 0.001
lr_scaling: "none"
scheduler: "cosine"

# AdamW-specific parameters
optimizer_kwargs:
  weight_decay: 0.2
  betas: [0.9, 0.98]
  eps: 1e-8
  amsgrad: false

# Scheduler-specific settings
scheduler_kwargs:
  # For step scheduler
  step_size: 10
  gamma: 0.1
  
  # For cosine scheduler
  cosine_t_max: null
  cosine_eta_min: 0
  
  # For linear scheduler  
  warmup_ratio: 0.05

# Fine-tuning specific settings
ft_start_epoch: 0
