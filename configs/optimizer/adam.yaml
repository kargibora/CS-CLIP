# Adam optimizer configuration
optimizer_type: "Adam"
learning_rate: 0.01
lr_scaling: "none"      # LR scaling: "linear", "sqrt", "none" for multi-GPU
scheduler: "none"       # LR scheduler: "none", "linear", "cosine", "step"

# Adam-specific parameters
optimizer_kwargs:
  betas: [0.9, 0.999]
  eps: 1e-8
  weight_decay: 0.0
  amsgrad: false

# Scheduler-specific settings (used when scheduler != "none")
scheduler_kwargs:
  # For step scheduler
  step_size: 10
  gamma: 0.1
  
  # For cosine scheduler  
  cosine_t_max: null      # Maximum number of iterations (defaults to total epochs)
  cosine_eta_min: 0       # Minimum learning rate
  
  # For linear scheduler
  warmup_ratio: 0.05      # Fraction of training for warmup

# Layer-wise learning rate configuration (disabled by default)
layerwise:
  enabled: false           # Set to true to enable layer-wise LR decay
  decay_rate: 0.8          # LR decay factor per layer
  decay_type: "exponential" # "exponential" or "linear"
  
  # Component-specific learning rate multipliers
  component_lrs:
    visual: 1.0            # Visual encoder LR multiplier
    text: 1.0              # Text encoder LR multiplier
    alignment: 1.0         # Alignment head LR multiplier
  
  # Parameters that should not have weight decay
  no_decay_patterns:
    - "bias"
    - "LayerNorm"
    - "layer_norm"
    - "ln_"
    - "norm"
  
  # Parameters to freeze (empty by default)
  freeze_patterns: []

# Fine-tuning specific settings
ft_start_epoch: 0       # Epoch to start fine-tuning (only used with FT alignment)
