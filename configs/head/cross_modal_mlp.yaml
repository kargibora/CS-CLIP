# LabCLIP scoring head configuration
# Concatenates image and text features, scores with MLP

# @package _global_.model.head

defaults:
  - default

# Head configuration
type: "cross_modal_mlp"    # Registry name for LabCLIP scorer
mode: "scoring"             # Scoring mode uses labclip unpacking/loss

# Cross-modal MLP specific parameters
mlp_hidden_dims: [512, 256]  # Hidden layer dimensions for MLP scorer
dropout: 0.1                  # Dropout rate
use_alignment: true          # Whether to align features before concatenation
