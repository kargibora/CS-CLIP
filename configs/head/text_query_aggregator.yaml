# @package model.head
# Text-Query Aggregator (TQA) Head Configuration
#
# Implements caption-conditioned image embeddings via cross-attention:
#   v_cls' = v_cls + scale * Attn(q=text, k=v_patches, v=v_patches)
#
# The text embedding "queries" the image patches to extract relevant information,
# enabling better compositional understanding (attributes, relations, colors).
#
# This head works with standard contrastive learning (InfoNCE/CLIP loss) and
# is compatible with component-based training via multi_caption loss.

# Head type and mode
type: "text_query_aggregator"  # Use TQA head
mode: "text_query_aggregator"  # Uses TQA-specific initialization

# Head parameters
params:
  embed_dim: 512               # Common embedding dimension for attention
  vision_dim: 768              # Native ViT-B dimension (patches are in native space)
  text_dim: 512                # CLIP's projected text dimension
  num_heads: 2                 # Number of attention heads
  dropout: 0.0                 # Dropout in attention (0 = no dropout)
  
  # Residual connection: v_cls' = v_cls + scale * attn_output
  use_residual: true           # Whether to add attention output to v_cls
  learnable_scale: true        # Whether residual scale is learnable
  initial_scale: 0.1           # Initial value for residual scale
  
  # Projection heads for final embeddings
  use_projection: true         # Whether to use projection heads
  projection_dim: null         # Output dimension (null = same as embed_dim)
  normalize_output: true       # L2-normalize output embeddings
  
  # Temperature (for contrastive loss)
  # WARNING: Setting learnable_temperature=true requires careful LR tuning
  # CLIP's default 0.07 is well-tested - keep it fixed unless you implement
  # proper safeguards (separate LR, gradient clipping, value clamping)
  learnable_temperature: false  # DO NOT change to true without proper safeguards
  initial_temperature: 0.07     # Standard CLIP temperature

# Loss configuration (using multi_caption for component-based training)
# TQA is compatible with standard InfoNCE, negclip, and multi_caption losses
# The loss is configured via configs/loss/*.yaml, not here
