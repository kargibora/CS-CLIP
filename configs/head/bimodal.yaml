# Bimodal alignment head configuration
# Standard CLIP with separate image and text alignment

# @package _global_.model.head

defaults:
  - default

# Head configuration
type: "flexible_multi_layer"  # Registry name for bimodal head
mode: "bimodal"                # Bimodal mode uses standard unpacking/loss

# Bimodal head specific parameters
init_temperature: 1        # Initial temperature for contrastive learning
freeze_temperature: false      # Whether to freeze temperature parameter
