# @package model.head
# Token-Conditioned Alignment (TCA) Head Configuration

# Head type and mode
type: "token_conditioned"  # Use TCA head
mode: "tca"                # Uses TCA-specific loss functions

# Head parameters
params:
  embed_dim: 512
  num_layers: 1
  
  # NOTE: use_text_alignment and use_image_alignment are controlled by
  # cfg.alignment.align_text and cfg.alignment.align_image
  # DO NOT set them here or they will override the alignment config!
  
  # Temperature (CRITICAL: Must be frozen for stability)
  # WARNING: Setting learnable_temperature=true causes temperature to drift to ~6e-7 after 1 epoch
  # This happens because gradients from 3 loss components (global CLIP, pair-aware, local token)
  # update the logit_scale parameter with learning rate 5e-6, causing catastrophic collapse.
  # CLIP's default 0.07 is a well-tested value - keep it fixed unless you implement:
  # 1. Separate optimizer with much smaller LR (~1e-8) for temperature
  # 2. Gradient clipping on logit_scale
  # 3. Value clamping to prevent extreme drift
  learnable_temperature: false  # DO NOT change to true without proper safeguards
  initial_temperature: 0.07     # Standard CLIP temperature
  
  # Token-patch grouping settings
  sparsify_threshold: null  # null = auto (1/P), or set manually (e.g., 0.02 for P=50)
  min_max_normalize: true   # Min-max normalize before sparsification
  normalize_similarity: true
  
  # Pooling method: "mean", "max", or "attention"
  pooling_method: "mean"

# Loss configuration
loss:
  # Loss weights
  lambda_clip: 1.0      # Weight for global CLIP loss
  lambda_pair: 1.0      # Weight for pair-aware contrastive loss
  lambda_local: 0.5     # Weight for local token-level loss
  
  # Pair-aware loss settings
  margin: 0.2           # Margin for negative constraint
  temperature: 0.07     # Temperature for contrastive losses
  
  # Hard negatives
  num_negatives: 4      # Number of hard negatives per image
  use_hard_negatives: true

# Training notes:
# - Requires patch-level and token-level features (cannot use cached embeddings)
# - Freeze CLIP encoders, only train alignment matrices A and B
# - Recommended optimizer: AdamW with lr=1e-4, weight_decay=0.01
# - Start with small num_negatives (2-4) to control compute
