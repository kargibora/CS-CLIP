# Batch Checkpoint Evaluation Configuration
#
# This file defines multiple checkpoints to evaluate in a single run.
# Each checkpoint will be evaluated on the default_datasets (unless specific datasets are provided).
# Results will be saved to separate CSV files.
#
# Usage:
#   python scripts/batch_evaluate_checkpoints.py --config configs/eval_checkpoints.yaml
#   
#   # Multi-GPU (8 GPUs):
#   torchrun --nproc_per_node=8 scripts/batch_evaluate_checkpoints.py --config configs/eval_checkpoints.yaml
#
# Checkpoint Types:
#   - openclip: Load directly from open_clip (e.g., "ViT-B/32")
#   - huggingface: Load from HuggingFace hub (e.g., "le723z/CE_CLIP")
#   - external: Load .pt checkpoint into base model (e.g., FSC-CLIP variants)
#   - local: Load your training checkpoint with config

