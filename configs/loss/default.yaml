# Loss configuration - auxiliary loss settings for binding problem
# Auxiliary loss weights (all default to 0.0 for standard contrastive training)
w_norm: 0.0             # Weight for norm consistency loss
w_ortho: 0.0            # Weight for orthogonality loss  
w_dist: 0.0             # Weight for distribution alignment loss
w_unif: 0.0             # Weight for uniformity loss
w_margin: 0.0           # Weight for margin gap loss
w_decor: 0.0            # Weight for decorrelation loss

# Multi-caption contrastive loss weights (new)
lambda_full: 1.0        # Weight for full caption loss
lambda_comp: 0.5        # Weight for component-level loss

# Optional projection matrix for auxiliary losses
projection_matrix_path: null  # Path to load a pre-trained projection matrix A

# Additional loss configuration options
loss_kwargs:
  # Temperature scaling options
  contrastive_mode: "with_negatives"
  # Multi-caption loss options (only used if loss_type == "multi_caption")
  lambda_full: 1.0
  lambda_comp: 0.5
  