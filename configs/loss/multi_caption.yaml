# Multi-Caption Contrastive Loss Configuration
# Modular loss architecture with independent loss terms
#
# Total Loss:
#   L = λ_full * L_full + λ_comp * L_comp + λ_align * L_align + λ_rank * L_rank + λ_para * L_para

# Loss type identifier
loss_type: "multi_caption"

# =============================================================================
# FULL CAPTION LOSS (L_full)
# =============================================================================
lambda_full: 1.0                       # Weight for full caption contrastive loss
use_negatives_full: true               # Use NegCLIP (true) or CLIP (false) for full caption

# =============================================================================
# COMPONENT CONTRASTIVE LOSS (L_comp)
# =============================================================================
lambda_components: 0.0                 # Weight for component contrastive loss (0 = disabled)
component_loss_type: "negclip"         # Type of contrastive loss for components:
                                       #   "clip": Standard CLIP loss (no negatives)
                                       #   "negclip": NegCLIP with batch negatives (B+B scores)
                                       #   "negclip_hard": NegCLIP with per-sample hard negative (B+1 scores)

# =============================================================================
# ALIGNMENT LOSS (L_align) - separate from contrastive
# =============================================================================
lambda_alignment: 0.0                  # Weight for alignment loss (0 = disabled)
alignment_loss_type: "margin"          # Type of alignment loss:
                                       #   "cosine": Direct alignment L = 1 - cos(I, t_k)
                                       #   "margin": Pairwise margin L = max(0, m - s_pos + s_neg)
alignment_margin: 0.1                  # Margin for margin-based alignment loss

# =============================================================================
# RANKING LOSS (L_rank) - enforces s(full) > s(comp)
# =============================================================================
lambda_rank: 0.0                       # Weight for ranking loss (0 = disabled)
rank_margin: 0.1                       # Margin: s(full) > s(comp) + margin
rank_reduction: "mean"                 # How to reduce over components: "mean" or "max"

# =============================================================================
# TEXT CONTRASTIVE MARGIN LOSS (L_text) - enforces s(t_full, t_comp+) > s(t_full, t_comp-)
# =============================================================================
lambda_text_contrastive: 0.0           # Weight for text-space contrastive margin loss (0 = disabled)
text_contrastive_margin: 0.1           # Margin: s(t_full, t_comp+) > s(t_full, t_comp-) + margin

# =============================================================================
# PARAPHRASE LOSS (L_para)
# =============================================================================
lambda_paraphrase: 0.0                 # Weight for paraphrase alignment loss (0 = disabled)

# =============================================================================
# CONTRASTIVE MODE (controls component processing)
# =============================================================================
contrastive_mode: "with_components_negatives"  # Options:
                                               # "without_negatives": CLIP on full captions only
                                               # "with_negatives": NegCLIP on full captions only
                                               # "with_components": Full + components (no negatives)
                                               # "with_components_negatives": Full + components (with negatives)

# =============================================================================
# DEPRECATED (for backward compatibility)
# =============================================================================
hybrid_margin_weight: 0.0              # Deprecated: use lambda_alignment instead
                                       # If set > 0, automatically converts to lambda_alignment
