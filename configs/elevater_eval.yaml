# ELEVATER Benchmark Evaluation Configuration
# This config file specifies how to evaluate a model on ELEVATER benchmarks

# Model Identification
name: "My CLIP Model"

# Checkpoint Type Options:
#   - openclip: Standard OpenCLIP model (e.g., ViT-B/32, ViT-L-14@openai)
#   - huggingface: HuggingFace Hub model (e.g., username/model-name)
#   - tripletclip: TripletCLIP model with separate vision/text encoders
#   - local: Local checkpoint file with associated config
#   - external: External checkpoint (state dict only, loaded into base model)
#   - projection: CLIP model with additional text projection layer
#   - clove: CLOVE model with weight interpolation
checkpoint_type: openclip

# Path or identifier for the checkpoint
# Examples:
#   - For openclip: "ViT-B/32", "ViT-L-14@openai", "ViT-B-32@laion400m_e32"
#   - For huggingface: "username/model-name"
#   - For local/external: "/path/to/checkpoint.pt"
checkpoint_path: "ViT-B/32"

# Base CLIP model architecture (used for local/external/projection checkpoints)
base_model: "ViT-B/32"

# Output directory for results
output_dir: "./elevater_results"

# Datasets to evaluate (optional - defaults to all 20 ELEVATER datasets)
# Available datasets:
#   caltech101, cifar10, cifar100, country211, dtd,
#   eurosat, fer2013, fgvc_aircraft, food101, gtsrb,
#   hateful_memes, kitti_distance, mnist, flowers102,
#   oxford_pets, patch_camelyon, sst2, resisc45,
#   stanford_cars, voc2007
datasets:
  - cifar10
  - cifar100
  - caltech101
  - dtd
  - flowers102
  - oxford_pets
  - food101
  - fgvc_aircraft
  - stanford_cars
  - eurosat

# Evaluation settings
use_fp32: true
batch_size: 64
num_workers: 4
force_openclip: false

# For projection checkpoints (optional)
# projection_path: "/path/to/projection_layer.pt"

# For CLOVE models (optional)
# clove_weight: 0.6
# pretrained: "openai"
