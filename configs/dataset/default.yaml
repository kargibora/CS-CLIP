# Dataset configuration
# Specify the dataset to use for training/evaluation
name: "LAION400M"  # Default dataset
choices: [
  "SPEC_I2T", "ControlledImages", "CC3M", "VG_Attribution", "VG_Relation", 
  "COCO_Order", "Flickr30k_Order", "VisMin", "SugarCrepe", "SugarCrepe_PP",
  "LAION400M", "Winoground", "BLA", "VALSE", "VL_CheckList", "ColorSwap", 
  "COCO_Counterfactuals"
]

# Dataset paths and metadata
data_path: null  # Path to the dataset root folder
subset_name: null  # Name of the subset (e.g., for COCO, VG, etc.)

# Data splitting configuration
split_type: "object"  # Data split strategy: "object", "random", "variation"
val_ratio: 0.2  # Fraction of data to use for validation split
split_by_tar: false  # Split train/val by tar files instead of samples (LAION only)

# Special LAION settings
use_tar_embeddings: true  # Use tar-based embedding storage for LAION400M
use_tar_batching: true    # Use tar-based batching for LAION dataset
