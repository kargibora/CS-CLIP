# LAION400M dataset configuration - EITHER MODE (NEW!)
# This config randomly chooses EITHER relation OR components per sample (never both)
# This provides a balanced mix without overlap in the same caption
name: "LAION400M"
data_path: "/mnt/lustre/datasets/laion400m/laion400m-data"
subset_name: "all"

# Data splitting configuration  
split_type: "object"
val_ratio: 0.01
split_by_tar: true  # Use tar-based splitting for LAION

# LAION-specific settings
use_tar_embeddings: true
use_tar_batching: true

# LAION-specific dataset kwargs
dataset_kwargs:
  tar_range: [0, 25600]  # Default tar range (0 to 25600)
  json_root: "/mnt/lustre/work/oh/owl336/LabCLIP_v2/laion400m_negatives_components"
  exclude_concepts: ["number"]
  use_auth_token: null
  use_component_sampling: true
  sample_relations: true
  sample_relation_or_components: "either"  # NEW: Random choice per sample (relation OR components, never both)
  relation_sample_prob: 0.5  # 50% relation samples, 50% component samples (per sample)
  negative_relation_sample_prob: 0.8  # Probability of using negative relation vs negative component
  inplace_replacement_prob: 0.7  # Probability of replacing component in-place for negatives
  num_component_captions: 3  # Number of component captions to sample (for component samples)
