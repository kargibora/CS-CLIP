# LAION400M dataset configuration
name: "LAION400M"
data_path: "/mnt/lustre/datasets/laion400m/laion400m-data"
subset_name: "all"

# Data splitting configuration  
split_type: "object"
val_ratio: 0.01
split_by_tar: true  # Use tar-based splitting for LAION

# LAION-specific settings
use_tar_embeddings: true
use_tar_batching: true

dataset_kwargs:
  tar_range: [0, 25600]
  json_root: "/mnt/lustre/work/oh/owl336/LabCLIP_v2/laion400m-negatives-with-swaps"
  exclude_concepts: ["number"]
  use_auth_token: null

  use_component_sampling: true
  sample_relations: true

  # SAMPLING MODE
  use_structured_sampling: false  # Enable structured paired positive-negative sampling
  structured_relation_prob: 0.5   # When structured=true: probability of trying relation pairs first
  use_context_in_component_pairs: true  # Include other components for context in component pairs

  # POSITIVES
  sample_relation_or_components: "mixed"   # "mixed" but with no comp+rel (see below)
  mix_comp_rel_prob: 0.0                  # ← disables comp+rel, acts like "either"
  relation_sample_prob: 0.5               # 50% relation-only, 50% component-only
  max_components_per_sample: 2            # each component caption is short (1–2 comps)
  num_component_captions: 3               # how many component captions per image (2–3 is fine)

  # NEGATIVES
  negative_relation_sample_prob: 0.6   # ~60% of the time use negative_relations if available
  inplace_replacement_prob: 0.7        # when not using neg-rel, try in-place replacement
  max_positive_components_with_negative: 1  # at most 1 extra positive comp in component-negatives

  use_swap_negatives: false
  swap_negative_prob: 0.0  # NEW: Probability of using swap negatives (0 = disabled for ablation)
