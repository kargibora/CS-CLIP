# Distributed training configuration optimized for torchrun
# Most settings are auto-detected from torchrun environment variables

# torchrun automatically sets these via environment variables:
# - RANK, LOCAL_RANK, WORLD_SIZE  
# - MASTER_ADDR, MASTER_PORT
# - distributed=True detection

# Only configure what torchrun doesn't handle:

# Data loading settings (per-GPU)
num_workers: 4          # Data loading workers per GPU (adjust based on CPU cores)
pin_memory: true        # Pin memory for faster GPU transfer

# Memory optimization  
disk_gather: false      # Use disk-based gathering for very large embeddings

# Legacy settings (not needed with torchrun)
distributed: false      # Auto-detected from environment variables
data_parallel: false   # Not recommended for multi-GPU
local_rank: -1          # Set automatically by torchrun  
master_port: null       # Set automatically by torchrun
