# Distributed training configuration
# Multi-GPU training modes
distributed: false       # Use DistributedDataParallel (recommended for multi-GPU)
data_parallel: false     # Use DataParallel (simpler but less efficient)

# Distributed training settings
local_rank: -1          # Local rank for distributed training (set by launcher)
master_port: null       # Master port for distributed training (random if not specified)

# Data loading for distributed training
num_workers: 2          # Number of data loading workers per GPU
pin_memory: true        # Pin memory for faster GPU transfer

# Memory optimization settings
disk_gather: false      # Use disk-based gathering for large embeddings
