# Logging configuration for training
# Controls what gets logged, how often, and what gets tracked

# Step-based logging (if None, only logs at epoch end)
log_every_k_steps: 1000  # Log training metrics every K steps (e.g., 100)
eval_every_k_steps: 5000  # Run validation every K steps (e.g., 1000)
save_every_k_steps: 50000  # Save checkpoint every K steps (e.g., 5000)
sample_every_k_steps: 20000  # Log sample visualizations every K steps (e.g., 500)

# Sample logging - track model learning on fixed samples
enable_sample_logging: true  # Enable tracking model predictions on fixed samples
sample_logging_num_samples: 5 # Number of samples to track
sample_logging_max_components: 5  # Maximum components to show per sample

# Logging details
log_gradients: false  # Log gradient statistics (can be expensive)
log_weights: false  # Log weight statistics
log_memory: true  # Log memory usage
